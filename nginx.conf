server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # charset
    charset utf-8;

    # MkDocs Material uses <hash>.css/js — cache them aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback: try file, then folder/index.html, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 page
    error_page 404 /404.html;
}
