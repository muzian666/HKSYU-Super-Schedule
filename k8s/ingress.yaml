apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hksyu-super-schedule
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pass3exceed4.com
      secretName: pass3exceed4-tls
  rules:
    - host: pass3exceed4.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hksyu-super-schedule
                port:
                  number: 8080
